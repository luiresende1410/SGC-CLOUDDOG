version: '3.9'

services:
  db_test:
    image: postgres:15
    environment:
      POSTGRES_DB: clouddog_costs_test
      POSTGRES_USER: clouddog
      POSTGRES_PASSWORD: clouddog123
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clouddog -d clouddog_costs_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_test:
    build: ./backend
    depends_on:
      db_test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://clouddog:clouddog123@db_test:5432/clouddog_costs_test
      JWT_SECRET_KEY: test-secret-key-minimum-32-characters-here
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
    command: pytest --cov=app tests/
